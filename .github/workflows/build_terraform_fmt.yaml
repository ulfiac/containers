name: build terraform-fmt
run-name: "build terraform-fmt: ${{ inputs.terraform_version }}"

on:
  workflow_dispatch:
    inputs:
      terraform_version:
        default: "1.15.6"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2, released 2026-01, checked 2026-06

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0, released 2026-05, checked 2026-06
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0, released 2026-05, checked 2026-06
        with:
          context: terraform-fmt
          platforms: linux/amd64
          push: true
          build-args: TERRAFORM_VERSION=${{ inputs.terraform_version }}
          tags: |
            ghcr.io/ulfiac/terraform-fmt:${{ inputs.terraform_version }}
            ghcr.io/ulfiac/terraform-fmt:latest
