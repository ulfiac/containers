name: build terraform-fmt

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build_terraform_fmt.yaml
      - terraform-fmt/**

permissions:
  contents: read

jobs:
  build-and-push-image:
    runs-on: ubuntu-24.04
    permissions:
      contents: read      # checkout
      packages: write     # push image to GHCR
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: read terraform version
        id: version
        run: echo "value=$(cat terraform-fmt/.terraform-version)" >> "$GITHUB_OUTPUT"

      - name: login to ghcr.io
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and load image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          build-args: |
            TERRAFORM_VERSION=${{ steps.version.outputs.value }}
          context: terraform-fmt
          load: true
          platforms: linux/amd64
          push: false
          tags: |
            ghcr.io/ulfiac/terraform-fmt:${{ steps.version.outputs.value }}

      - name: scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          exit-code: '1'
          image-ref: 'ghcr.io/ulfiac/terraform-fmt:${{ steps.version.outputs.value }}'

      - name: push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          build-args: |
            TERRAFORM_VERSION=${{ steps.version.outputs.value }}
          context: terraform-fmt
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ulfiac/terraform-fmt:${{ steps.version.outputs.value }}
