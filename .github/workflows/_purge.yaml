name: _purge

on:
  schedule:
    - cron: '53 8 * * 1'  # weekly, Monday 08:53 UTC (03:53 EST, 04:53 EDT)
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  packages: write

jobs:
  purge-runs:
    uses: ulfiac/commons/.github/workflows/reusable_purge_workflow_logs.yaml@27c2c51ec5c54f2dd40fc1f47fc63b12c30bc08a # v1.0.9

  purge-packages:
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    strategy:
      fail-fast: false
      matrix:
        package:
          - terraform-fmt
          - terragrunt-hcl-fmt
          - tflint
          - utils
    steps:
      - name: Delete untagged versions
        run: |
          gh api "/users/${{ github.repository_owner }}/packages/container/${{ matrix.package }}/versions" --paginate \
            --jq '.[] | select(.metadata.container.tags | length == 0) | .id' \
          | while read -r id; do
              gh api -X DELETE "/users/${{ github.repository_owner }}/packages/container/${{ matrix.package }}/versions/${id}"
            done

      - name: Delete old tagged versions, keep newest 3
        run: |
          gh api "/users/${{ github.repository_owner }}/packages/container/${{ matrix.package }}/versions" \
            --jq '[.[] | select(.metadata.container.tags | length > 0)] | sort_by(.updated_at) | reverse | .[3:][] | .id' \
          | while read -r id; do
              gh api -X DELETE "/users/${{ github.repository_owner }}/packages/container/${{ matrix.package }}/versions/${id}"
            done
