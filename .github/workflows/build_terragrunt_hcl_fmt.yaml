name: build terragrunt-hcl-fmt

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build_terragrunt_hcl_fmt.yaml
      - terragrunt-hcl-fmt/**

permissions:
  contents: read

jobs:
  build-and-push-image:
    runs-on: ubuntu-24.04
    permissions:
      contents: read      # checkout
      packages: write     # push image to GHCR
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Read Terragrunt version
        id: version
        run: echo "value=$(cat terragrunt-hcl-fmt/.terragrunt-version)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: terragrunt-hcl-fmt
          platforms: linux/amd64
          push: true
          build-args: TERRAGRUNT_VERSION=${{ steps.version.outputs.value }}
          tags: |
            ghcr.io/ulfiac/terragrunt-hcl-fmt:${{ steps.version.outputs.value }}
