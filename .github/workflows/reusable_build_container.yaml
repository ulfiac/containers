name: reusable-build-container

on:
  workflow_call:
    inputs:
      image_name:
        description: "Container image name (e.g., terraform-terragrunt)"
        required: true
        type: string
      context:
        description: "Path to the Docker build context directory"
        required: true
        type: string
      platforms:
        default: "linux/amd64,linux/arm64"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2, released 2026-01, checked 2026-06

      - name: Generate image tag
        id: tag
        run: echo "value=$(date -u +%Y%m%d.%H%M%S)" >> "$GITHUB_OUTPUT"

      # installs QEMU to emulate non-native CPU architectures (e.g. arm64) on the amd64 runner
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0, released 2026-05, checked 2026-06
      # installs Docker Buildx, which orchestrates multi-platform builds using QEMU
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0, released 2026-05, checked 2026-06

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0, released 2026-05, checked 2026-06
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0, released 2026-05, checked 2026-06
        with:
          context: ${{ inputs.context }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: |
            ghcr.io/ulfiac/${{ inputs.image_name }}:${{ steps.tag.outputs.value }}
            ghcr.io/ulfiac/${{ inputs.image_name }}:latest
